name: Build Formula Data

on:
  push:
    paths:
      - 'data/banggeuk_source.txt'
      - 'data/aliases.json'
      - 'build_data.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build formulas.json
        run: python build_data.py

      - name: Validate formulas.json
        run: |
          python -c "
          import json, sys
          with open('data/formulas.json') as f:
              data = json.load(f)
          count = len(data.get('formulas', []))
          if count == 0:
              print('ERROR: No formulas found', file=sys.stderr)
              sys.exit(1)
          print(f'OK: {count} formulas built')
          "

      - name: Sync to frontend/data
        run: |
          cp data/formulas.json frontend/data/formulas.json
          cp data/aliases.json frontend/data/aliases.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data/formulas.json frontend/data/aliases.json
          git diff --staged --quiet || git commit -m "chore: rebuild formulas.json from source"
          git push
